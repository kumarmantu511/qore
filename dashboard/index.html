<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QoreChain Wallet Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        .wallet-address {
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600">
                        <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"></path>
                    </svg>
                    <h1 class="text-3xl font-bold text-gray-900">QoreChain Wallet Dashboard</h1>
                </div>
                <button onclick="refreshWallets()" class="flex items-center space-x-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="refresh-icon">
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path>
                        <path d="M16 21h5v-5"></path>
                    </svg>
                    <span>Refresh</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-600 font-medium">Total Wallets</p>
                        <p class="text-3xl font-bold text-gray-900 mt-2" id="total-wallets">0</p>
                    </div>
                    <div class="bg-blue-100 rounded-full p-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600">
                            <rect width="16" height="12" x="2" y="6" rx="2"></rect>
                            <path d="M12 12h.01"></path>
                            <path d="M17 12h.01"></path>
                            <path d="M7 12h.01"></path>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-600 font-medium">Active</p>
                        <p class="text-3xl font-bold text-green-600 mt-2" id="active-wallets">0</p>
                    </div>
                    <div class="bg-green-100 rounded-full p-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-600">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-600 font-medium">Errors</p>
                        <p class="text-3xl font-bold text-red-600 mt-2" id="error-wallets">0</p>
                    </div>
                    <div class="bg-red-100 rounded-full p-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-600">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" x2="12" y1="8" y2="12"></line>
                            <line x1="12" x2="12.01" y1="16" y2="16"></line>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Wallet Table -->
        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-xl font-semibold text-gray-900">Wallet List</h2>
                <p class="text-sm text-gray-500 mt-1">Auto-refreshes every 30 seconds</p>
            </div>

            <div id="loading" class="hidden flex items-center justify-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            </div>

            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200" id="wallet-table">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Password</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Wallet Address</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Created</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="wallet-tbody">
                        <!-- Wallet rows will be inserted here -->
                    </tbody>
                </table>
            </div>

            <div id="no-wallets" class="hidden flex flex-col items-center justify-center py-12">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400 mb-4">
                    <rect width="16" height="12" x="2" y="6" rx="2"></rect>
                    <path d="M12 12h.01"></path>
                    <path d="M17 12h.01"></path>
                    <path d="M7 12h.01"></path>
                </svg>
                <p class="text-gray-500 text-lg">No wallets yet</p>
                <p class="text-gray-400 text-sm mt-2">Run the bot to create wallets</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <p class="text-center text-gray-500 text-sm">
                QoreChain Auto Bot Dashboard &copy; 2026 | Last updated: <span id="last-updated">Never</span>
            </p>
        </div>
    </footer>

    <script>
        // Configuration
        const WALLETS_FILE_PATH = '../data/wallets.json';
        let wallets = [];

        /**
         * Load wallets from JSON file
         */
        async function loadWallets() {
            try {
                const response = await fetch(WALLETS_FILE_PATH);
                if (!response.ok) {
                    if (response.status === 404) {
                        console.log('Wallets file not found, starting with empty list');
                        return [];
                    }
                    throw new Error('Failed to load wallets');
                }
                return await response.json();
            } catch (error) {
                console.error('Error loading wallets:', error);
                return [];
            }
        }

        /**
         * Format wallet address for display
         */
        function formatWalletAddress(address) {
            if (!address) return 'N/A';
            if (address.length <= 10) return address;
            return `${address.substring(0, 6)}...${address.substring(address.length - 4)}`;
        }

        /**
         * Copy wallet address to clipboard
         */
        function copyToClipboard(address) {
            navigator.clipboard.writeText(address).then(() => {
                showNotification('Address copied to clipboard!', 'success');
            }).catch(err => {
                showNotification('Failed to copy address', 'error');
            });
        }

        /**
         * Delete wallet entry
         */
        async function deleteWallet(email) {
            if (!confirm(`Are you sure you want to delete wallet for ${email}?`)) {
                return;
            }

            try {
                // Note: This requires a backend API to actually delete from file
                // For now, we'll just show a notification
                showNotification('Delete functionality requires backend API', 'info');
            } catch (error) {
                showNotification('Failed to delete wallet', 'error');
            }
        }

        /**
         * Show notification
         */
        function showNotification(message, type = 'info') {
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                info: 'bg-blue-500'
            };

            const notification = document.createElement('div');
            notification.className = `fixed bottom-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg z-50 transition-opacity duration-300`;
            notification.textContent = message;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.opacity = '0';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        /**
         * Format date for display
         */
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        /**
         * Get status badge HTML
         */
        function getStatusBadge(status, errorMessage) {
            const badges = {
                active: '<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">✓ Active</span>',
                error: `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800" title="${errorMessage || 'Error'}">✗ Error</span>`,
                pending: '<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">⏳ Pending</span>'
            };
            return badges[status] || badges.pending;
        }

        /**
         * Render wallet table
         */
        function renderWalletTable(walletData) {
            const tbody = document.getElementById('wallet-tbody');
            const noWallets = document.getElementById('no-wallets');
            const table = document.getElementById('wallet-table');

            if (walletData.length === 0) {
                noWallets.classList.remove('hidden');
                table.classList.add('hidden');
                return;
            }

            noWallets.classList.add('hidden');
            table.classList.remove('hidden');

            tbody.innerHTML = walletData.map(wallet => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-4 whitespace-nowrap text-xs text-gray-500">${wallet.id}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${wallet.email}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">
                        <button onclick="navigator.clipboard.writeText('${wallet.password}');showNotification('Password copied!', 'success')" 
                                class="hover:text-blue-600 cursor-pointer" title="Click to copy">
                            ••••••••
                        </button>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm wallet-address text-gray-600">
                        ${wallet.walletAddress ? `
                            <div class="flex items-center space-x-2">
                                <span>${formatWalletAddress(wallet.walletAddress)}</span>
                                <button onclick="copyToClipboard('${wallet.walletAddress}')" 
                                        class="text-blue-600 hover:text-blue-800" title="Copy full address">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
                                        <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
                                    </svg>
                                </button>
                            </div>
                        ` : 'N/A'}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${formatDate(wallet.createdAt)}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${getStatusBadge(wallet.status, wallet.errorMessage)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button onclick="deleteWallet('${wallet.email}')" 
                                class="text-red-600 hover:text-red-900 mr-3" title="Delete">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 6h18"></path>
                                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                            </svg>
                        </button>
                    </td>
                </tr>
            `).join('');

            // Update stats
            updateStats(walletData);
        }

        /**
         * Update statistics
         */
        function updateStats(walletData) {
            const total = walletData.length;
            const active = walletData.filter(w => w.status === 'active').length;
            const errors = walletData.filter(w => w.status === 'error').length;

            document.getElementById('total-wallets').textContent = total;
            document.getElementById('active-wallets').textContent = active;
            document.getElementById('error-wallets').textContent = errors;
        }

        /**
         * Refresh wallets
         */
        async function refreshWallets() {
            const loading = document.getElementById('loading');
            const refreshIcon = document.getElementById('refresh-icon');
            
            loading.classList.remove('hidden');
            refreshIcon.classList.add('animate-spin');

            wallets = await loadWallets();
            renderWalletTable(wallets);

            loading.classList.add('hidden');
            refreshIcon.classList.remove('animate-spin');
            
            document.getElementById('last-updated').textContent = new Date().toLocaleString();
        }

        // Initial load
        refreshWallets();

        // Auto-refresh every 30 seconds
        setInterval(refreshWallets, 30000);
    </script>
</body>
</html>
