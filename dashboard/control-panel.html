<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QoreChain Bot Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
        .terminal-font { font-family: 'Courier New', monospace; }
        .log-entry { font-size: 12px; padding: 2px 0; }
        .log-info { color: #3b82f6; }
        .log-success { color: #10b981; }
        .log-error { color: #ef4444; }
        .log-warning { color: #f59e0b; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <h1 class="text-2xl font-bold text-blue-400">🤖 QoreChain Bot Control Panel</h1>
                <div class="flex items-center space-x-4">
                    <span id="status-badge" class="px-3 py-1 bg-red-500 rounded-full text-sm font-semibold">
                        ● Stopped
                    </span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- Control Buttons -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <!-- Start Bot -->
            <button onclick="startBot()" id="btn-start" 
                    class="bg-green-600 hover:bg-green-700 disabled:bg-gray-600 disabled:cursor-not-allowed 
                           text-white font-bold py-4 px-6 rounded-lg transition-all transform hover:scale-105
                           flex items-center justify-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                <span>Start Bot</span>
            </button>

            <!-- Stop Bot -->
            <button onclick="stopBot()" id="btn-stop" 
                    class="bg-red-600 hover:bg-red-700 disabled:bg-gray-600 disabled:cursor-not-allowed 
                           text-white font-bold py-4 px-6 rounded-lg transition-all transform hover:scale-105
                           flex items-center justify-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                </svg>
                <span>Stop Bot</span>
            </button>

            <!-- Clear Cache -->
            <button onclick="clearCache()" 
                    class="bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-4 px-6 rounded-lg 
                           transition-all transform hover:scale-105 flex items-center justify-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
                <span>Clear Cache</span>
            </button>

            <!-- Auto Mode Toggle -->
            <button onclick="toggleAutoMode()" id="btn-auto" 
                    class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-6 rounded-lg 
                           transition-all transform hover:scale-105 flex items-center justify-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                <span id="auto-mode-text">Auto Mode: OFF</span>
            </button>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
                <div class="text-gray-400 text-sm mb-1">Total Wallets</div>
                <div class="text-3xl font-bold text-blue-400" id="stat-total">0</div>
            </div>
            <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
                <div class="text-gray-400 text-sm mb-1">Active</div>
                <div class="text-3xl font-bold text-green-400" id="stat-active">0</div>
            </div>
            <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
                <div class="text-gray-400 text-sm mb-1">Errors</div>
                <div class="text-3xl font-bold text-red-400" id="stat-errors">0</div>
            </div>
            <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
                <div class="text-gray-400 text-sm mb-1">Last Run</div>
                <div class="text-xl font-bold text-yellow-400" id="stat-last-run">Never</div>
            </div>
        </div>

        <!-- Live Terminal Log -->
        <div class="bg-gray-800 rounded-lg border border-gray-700 mb-6">
            <div class="p-4 border-b border-gray-700 flex items-center justify-between">
                <h2 class="text-lg font-bold flex items-center space-x-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="4 17 10 11 4 5"></polyline>
                        <line x1="12" y1="19" x2="20" y2="19"></line>
                    </svg>
                    <span>Live Terminal</span>
                </h2>
                <button onclick="clearLogs()" class="text-gray-400 hover:text-white text-sm">
                    Clear Logs
                </button>
            </div>
            <div id="terminal" class="p-4 h-64 overflow-y-auto terminal-font bg-gray-900 rounded-b-lg">
                <div class="log-entry log-info">[SYSTEM] Control panel initialized...</div>
                <div class="log-entry log-info">[INFO] Ready to start bot</div>
            </div>
        </div>

        <!-- Wallets Table -->
        <div class="bg-gray-800 rounded-lg border border-gray-700">
            <div class="p-4 border-b border-gray-700 flex items-center justify-between">
                <h2 class="text-lg font-bold">Created Wallets</h2>
                <button onclick="refreshWallets()" class="text-blue-400 hover:text-blue-300 text-sm flex items-center space-x-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="refresh-icon">
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path>
                        <path d="M16 21h5v-5"></path>
                    </svg>
                    <span>Refresh</span>
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-900">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase">Email</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase">Password</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase">Wallet Address</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase">Status</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase">Created</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="wallets-tbody" class="divide-y divide-gray-700">
                        <!-- Wallets will be loaded here -->
                    </tbody>
                </table>
            </div>
            <div id="no-wallets" class="hidden p-8 text-center text-gray-400">
                No wallets created yet. Click "Start Bot" to begin!
            </div>
        </div>
    </main>

    <script>
        let autoMode = false;
        let botRunning = false;
        let wallets = [];

        // Add log entry
        function addLog(message, type = 'info') {
            const terminal = document.getElementById('terminal');
            const timestamp = new Date().toLocaleTimeString();
            const logClass = `log-${type}`;
            
            const entry = document.createElement('div');
            entry.className = `log-entry ${logClass}`;
            entry.textContent = `[${timestamp}] ${message}`;
            
            terminal.appendChild(entry);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Start bot
        async function startBot() {
            if (botRunning) {
                addLog('Bot is already running!', 'warning');
                return;
            }

            addLog('Starting bot...', 'info');
            botRunning = true;
            updateStatus('running');
            document.getElementById('btn-start').disabled = true;
            document.getElementById('btn-stop').disabled = false;

            try {
                const response = await fetch('/api/start-bot', { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    addLog('Bot started successfully!', 'success');
                } else {
                    addLog('Failed to start bot: ' + result.error, 'error');
                }
            } catch (error) {
                addLog('Error starting bot: ' + error.message, 'error');
            } finally {
                botRunning = false;
                updateStatus('stopped');
                document.getElementById('btn-start').disabled = false;
                document.getElementById('btn-stop').disabled = true;
                refreshWallets();
            }
        }

        // Stop bot
        function stopBot() {
            addLog('Stopping bot...', 'warning');
            // In real implementation, this would call an API endpoint
            botRunning = false;
            updateStatus('stopped');
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-stop').disabled = true;
            addLog('Bot stopped', 'info');
        }

        // Clear cache
        async function clearCache() {
            addLog('Clearing cache...', 'info');
            try {
                const response = await fetch('/api/clear-cache', { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    addLog('Cache cleared successfully!', 'success');
                } else {
                    addLog('Failed to clear cache', 'error');
                }
            } catch (error) {
                addLog('Error clearing cache: ' + error.message, 'error');
            }
        }

        // Toggle auto mode
        function toggleAutoMode() {
            autoMode = !autoMode;
            const btnText = document.getElementById('auto-mode-text');
            btnText.textContent = autoMode ? 'Auto Mode: ON' : 'Auto Mode: OFF';
            
            if (autoMode) {
                addLog('Auto mode enabled - bot will run continuously', 'info');
            } else {
                addLog('Auto mode disabled', 'info');
            }
        }

        // Update status badge
        function updateStatus(status) {
            const badge = document.getElementById('status-badge');
            if (status === 'running') {
                badge.className = 'px-3 py-1 bg-green-500 rounded-full text-sm font-semibold animate-pulse';
                badge.textContent = '● Running';
            } else {
                badge.className = 'px-3 py-1 bg-red-500 rounded-full text-sm font-semibold';
                badge.textContent = '● Stopped';
            }
        }

        // Refresh wallets
        async function refreshWallets() {
            try {
                const response = await fetch('/data/wallets.json');
                if (!response.ok) {
                    if (response.status === 404) {
                        wallets = [];
                    } else {
                        throw new Error('Failed to load wallets');
                    }
                } else {
                    wallets = await response.json();
                }
                
                renderWallets();
                updateStats();
            } catch (error) {
                addLog('Error loading wallets: ' + error.message, 'error');
            }
        }

        // Render wallets table
        function renderWallets() {
            const tbody = document.getElementById('wallets-tbody');
            const noWallets = document.getElementById('no-wallets');
            
            if (wallets.length === 0) {
                noWallets.classList.remove('hidden');
                tbody.innerHTML = '';
                return;
            }
            
            noWallets.classList.add('hidden');
            
            tbody.innerHTML = wallets.map(wallet => `
                <tr class="hover:bg-gray-700 transition-colors">
                    <td class="px-4 py-3 text-sm">${wallet.email}</td>
                    <td class="px-4 py-3 text-sm font-mono">••••••••</td>
                    <td class="px-4 py-3 text-sm font-mono text-blue-400">
                        ${wallet.walletAddress ? wallet.walletAddress.substring(0, 10) + '...' : 'N/A'}
                    </td>
                    <td class="px-4 py-3 text-sm">
                        ${wallet.status === 'active' 
                            ? '<span class="px-2 py-1 bg-green-900 text-green-400 rounded text-xs">✓ Active</span>'
                            : '<span class="px-2 py-1 bg-red-900 text-red-400 rounded text-xs">✗ Error</span>'
                        }
                    </td>
                    <td class="px-4 py-3 text-sm text-gray-400">${new Date(wallet.createdAt).toLocaleString()}</td>
                    <td class="px-4 py-3 text-sm">
                        <button onclick="copyWallet('${wallet.walletAddress}')" 
                                class="text-blue-400 hover:text-blue-300 mr-2" title="Copy Address">
                            📋
                        </button>
                        <button onclick="deleteWallet('${wallet.email}')" 
                                class="text-red-400 hover:text-red-300" title="Delete">
                            🗑️
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // Update statistics
        function updateStats() {
            const total = wallets.length;
            const active = wallets.filter(w => w.status === 'active').length;
            const errors = wallets.filter(w => w.status === 'error').length;
            
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-active').textContent = active;
            document.getElementById('stat-errors').textContent = errors;
            
            if (total > 0) {
                const lastRun = new Date(wallets[wallets.length - 1].createdAt).toLocaleTimeString();
                document.getElementById('stat-last-run').textContent = lastRun;
            }
        }

        // Copy wallet address
        function copyWallet(address) {
            navigator.clipboard.writeText(address);
            addLog('Wallet address copied to clipboard!', 'success');
        }

        // Delete wallet
        function deleteWallet(email) {
            if (confirm(`Delete wallet for ${email}?`)) {
                addLog('Delete functionality requires backend API', 'warning');
            }
        }

        // Clear logs
        function clearLogs() {
            const terminal = document.getElementById('terminal');
            terminal.innerHTML = '';
            addLog('Logs cleared', 'info');
        }

        // Initialize
        refreshWallets();
        setInterval(refreshWallets, 10000); // Auto-refresh every 10 seconds
        
        // Initial button states
        document.getElementById('btn-stop').disabled = true;
    </script>
</body>
</html>
